name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Format check
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Typecheck
        run: uv run --python ${{ matrix.python-version }} pyrefly check

      - name: Test
        run: uv run --python ${{ matrix.python-version }} pytest -v
